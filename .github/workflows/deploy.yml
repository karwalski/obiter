# Manual Deployment Workflow
#
# Trigger manually from the Actions tab to deploy website and/or
# rebuild the add-in without waiting for a push to main.
#
# Required repository secrets:
#   LIGHTSAIL_SSH_KEY  — SSH private key for bitnami@3.106.204.98 (Lightsail instance)
#   DEPLOY_KEY         — GitHub deploy key for pushing

name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_website:
        description: 'Deploy website to Lightsail'
        required: true
        default: true
        type: boolean
      deploy_addin:
        description: 'Build and upload add-in artifact'
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ inputs.deploy_addin }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run validate

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  deploy-website:
    runs-on: ubuntu-latest
    if: ${{ inputs.deploy_website }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy website to Lightsail
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$LIGHTSAIL_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 3.106.204.98 >> ~/.ssh/known_hosts 2>/dev/null

          # Sync website files to Lightsail nginx html directory
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            website/ \
            bitnami@3.106.204.98:/opt/bitnami/nginx/html/

          # Restart the Node.js backend server
          ssh -i ~/.ssh/deploy_key bitnami@3.106.204.98 \
            'sudo systemctl restart obiter-backend || pm2 restart obiter-backend'

          rm -f ~/.ssh/deploy_key
