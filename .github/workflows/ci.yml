# CI Pipeline for Obiter
#
# Required repository secrets:
#   LIGHTSAIL_SSH_KEY  — SSH private key for bitnami@3.106.204.98 (Lightsail instance)
#   DEPLOY_KEY         — GitHub deploy key for pushing

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test
        id: tests

      - name: Upload test results
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            junit.xml
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run validate

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  deploy-website:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check for changes
        id: changes
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED_FILES" | grep -q '^website/'; then
            echo "website=true" >> "$GITHUB_OUTPUT"
          else
            echo "website=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED_FILES" | grep -q '^website/server/'; then
            echo "server=true" >> "$GITHUB_OUTPUT"
          else
            echo "server=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED_FILES" | grep -q '^src/'; then
            echo "addin=true" >> "$GITHUB_OUTPUT"
          else
            echo "addin=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up SSH
        if: steps.changes.outputs.website == 'true' || steps.changes.outputs.addin == 'true'
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$LIGHTSAIL_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 3.106.204.98 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy website to Lightsail
        if: steps.changes.outputs.website == 'true'
        run: |
          # Sync website files (excluding server/) to nginx html directory
          rsync -avz --delete --exclude='server/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            website/ \
            bitnami@3.106.204.98:/opt/bitnami/nginx/html/

      - name: Deploy server to Lightsail
        if: steps.changes.outputs.server == 'true'
        run: |
          # Sync server files
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            website/server/ \
            bitnami@3.106.204.98:/var/www/obiter/server/

          # Install dependencies on remote if package.json changed
          ssh -i ~/.ssh/deploy_key bitnami@3.106.204.98 \
            'cd /var/www/obiter/server && npm ci --production'

          # Restart the Node.js backend server using screen
          ssh -i ~/.ssh/deploy_key bitnami@3.106.204.98 \
            'pkill -f "node.*index.js" 2>/dev/null; sleep 1; source /etc/obiter/env.sh && cd /var/www/obiter/server && screen -dmS obiter bash -c "source /etc/obiter/env.sh && node index.js"'

      - name: Deploy add-in to Lightsail
        if: steps.changes.outputs.addin == 'true'
        run: |
          # Download the dist artifact built in the build job
          # (already available via needs: build)

          # Build production add-in
          npm ci
          npm run build:prod

          # Deploy built add-in files to /app/ on the server
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            bitnami@3.106.204.98:/opt/bitnami/nginx/html/app/

      - name: Clean up SSH key
        if: always() && (steps.changes.outputs.website == 'true' || steps.changes.outputs.addin == 'true')
        run: rm -f ~/.ssh/deploy_key
